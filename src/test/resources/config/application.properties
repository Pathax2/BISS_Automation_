# ===================================================================================================================================
# File          : application.properties
# Description   : Base configuration defaults for the BISS automation framework.
#                 These values apply to ALL environments unless overridden by a profile file.
#                 Profile files (application-dev.properties, application-staging.properties, etc.)
#                 overlay and override these values for specific environments.
#
# Folder        : src/test/resources/config/application.properties
#
# Activation    : This file is always loaded. Profile overlay activated via -Denv=staging
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 10-03-2026
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Browser Configuration
# -----------------------------------------------------------------------------------------------------------------------------------
# Supported values: CHROME | FIREFOX | EDGE
browser=CHROME

# Run browser in headless mode (no visible window) ? set true for CI/Bamboo agents
headless=false

# -----------------------------------------------------------------------------------------------------------------------------------
# WebDriver Wait Configuration
# -----------------------------------------------------------------------------------------------------------------------------------
# Maximum seconds to wait for element visibility/clickability
explicit.wait.seconds=20

# Maximum seconds for page load
page.load.timeout.seconds=30

# Polling interval for explicit waits (milliseconds)
wait.polling.interval.ms=500

# -----------------------------------------------------------------------------------------------------------------------------------
# Retry Configuration
# -----------------------------------------------------------------------------------------------------------------------------------
# Number of times to retry a failed test case (0 = no retry)
retry.count=1

# Exception types that trigger a retry (comma-separated simple class names)
# Only TimeoutException and StaleElementReferenceException are retried by default
retry.on.exceptions=TimeoutException,StaleElementReferenceException

# -----------------------------------------------------------------------------------------------------------------------------------
# Test Data
# -----------------------------------------------------------------------------------------------------------------------------------
test.data.file.path=src/test/resources/Test_Data/TestData.xlsx
test.data.sheet.name=Data

# -----------------------------------------------------------------------------------------------------------------------------------
# Execution Control
# -----------------------------------------------------------------------------------------------------------------------------------
execution.control.path=src/test/resources/Execution_Control_File/ExecutionControl.xlsx
execution.control.sheet=Sheet1

# -----------------------------------------------------------------------------------------------------------------------------------
# Object Repository
# -----------------------------------------------------------------------------------------------------------------------------------
object.repository.path=src/test/resources/Object_Repository/ObjectRepository.properties

# -----------------------------------------------------------------------------------------------------------------------------------
# Feature Files
# -----------------------------------------------------------------------------------------------------------------------------------
feature.directory.path=src/test/resources/Test_Cases/
glue.package=stepdefinitions

# -----------------------------------------------------------------------------------------------------------------------------------
# Reporting
# -----------------------------------------------------------------------------------------------------------------------------------
report.docs.path=Test_Report/docs
report.screenshots.path=Test_Report/screenshots
report.html.path=Test_Report/html/
junit.xml.path=target/surefire-reports/

# Screenshot on PASS as well (true = capture every step, false = failure only)
screenshot.on.pass=false

# Auto-delete screenshots older than N days (0 = never delete)
screenshot.retention.days=30

# -----------------------------------------------------------------------------------------------------------------------------------
# Email Notification
# -----------------------------------------------------------------------------------------------------------------------------------
notify.email.enabled=false
notify.email.smtp.host=smtp.office365.com
notify.email.smtp.port=587
notify.email.smtp.starttls=true
notify.email.from=automation@biss.ie
notify.email.to=qa-team@biss.ie
# notify.email.password ? set via Bamboo plan variable, never store here

# -----------------------------------------------------------------------------------------------------------------------------------
# Database (optional ? leave blank if not used)
# -----------------------------------------------------------------------------------------------------------------------------------
db.enabled=false
db.driver=oracle.jdbc.OracleDriver
db.url=
db.username=
# db.password ? set via Bamboo plan variable, never store here
db.connection.pool.size=5
db.query.timeout.seconds=30

# -----------------------------------------------------------------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------------------------------------------------------------
log.level=INFO
log.output.path=target/logs/