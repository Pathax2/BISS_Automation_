# ===================================================================================================================================
# File          : ObjectRepository.properties
# Description   : Central Object Repository for the BISS automation framework.
#                 All UI element locators are stored here and read via ObjReader.getLocator(key).
#
# NAMING CONVENTION :
#   Keys use camelCase with a page prefix and element type suffix.
#   Locator type suffix (optional ? used by ObjReader.getLocatorType):
#     .id | .name | .xpath | .css | .classname | .tagname | .linktext | .partiallinktext
#   Keys WITHOUT a suffix default to XPATH in ObjReader.getLocatorType().
#
# STRUCTURE :
#   Objects are grouped by ELEMENT TYPE for easy maintenance and discoverability:
#     1.  TEXT BOXES & INPUT FIELDS
#     2.  BUTTONS
#     3.  LINKS & NAVIGATION
#     4.  DROPDOWNS & SELECTS
#     5.  CHECKBOXES
#     6.  RADIO BUTTONS
#     7.  TOGGLES
#     8.  LABELS, HEADERS & TEXT VERIFICATIONS
#     9.  ERROR & VALIDATION MESSAGES
#     10. TABLE & LIST ELEMENTS
#     11. DIALOG & MODAL CONTAINERS
#     12. MAP & GEOSPATIAL ELEMENTS
#     13. UTILITY & FRAMEWORK ELEMENTS
#
# PLACEHOLDER CONVENTION :
#   %s  ? replaced at runtime via String.format() in step definitions
#   {idx} ? replaced at runtime via String.replace() in step definitions
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 10-03-2026
# Updated       : 28-03-2026 ? Reorganised by element type; added inline comments
# ===================================================================================================================================


# ===================================================================================================================================
# SECTION 1 : TEXT BOXES & INPUT FIELDS
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Login / Authentication ? Input Fields
# -----------------------------------------------------------------------------------------------------------------------------------

# Keycloak username input field
iUsernametxtbox                 = //input[@id='username']

# Keycloak password input field
iPasswordtxtbox                 = //input[@id='password']

# MFA OTP input field (Microsoft Authenticator one-time code)
iOPTtxtbox                      = //input[@id='otp']

# TOTP 6-digit one-time password input field
iTOTPtextbox                    = //input[@id='totp']

# Dynamic PIN input field ? replace {idx} at runtime with the digit index
iPinInputIndex                  = //input[contains(@class,'pin-input') and @data-index='{idx}']

# -----------------------------------------------------------------------------------------------------------------------------------
# Client Search ? Input Fields
# -----------------------------------------------------------------------------------------------------------------------------------

# Herd number search input on the My Clients search bar
herdSearchInput                 = //*[@id="mat-input-0"]

# Application name search bar on the Authorised Applications / home screen
iAppSearchBar                   = //input[@placeholder='Type the name of the app']

# -----------------------------------------------------------------------------------------------------------------------------------
# Land Details Dialog ? Input Fields
# -----------------------------------------------------------------------------------------------------------------------------------

# Claimed Area (ha) numeric input inside the Edit Parcel dialog
iClaimedAreaInput               = //input[@id='claimedArea']

# Land parcel ID text input on the Add Parcel dialog
iParcelInput                    = //input[@id='parcelInput']

# Plot Reference input on the Add Plot dialog
iPlotReferenceInput             = //input[@formcontrolname='plotReference']

# -----------------------------------------------------------------------------------------------------------------------------------
# EH Change Request ? Input Fields
# -----------------------------------------------------------------------------------------------------------------------------------

# Free-text reason textarea for requesting a change to eligible hectare
iEhChangeReasonTextarea         = //textarea[@id='reasonEhChange']


# ===================================================================================================================================
# SECTION 2 : BUTTONS
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Login / Authentication ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# Initial 'Log In' button shown on the BISS landing / welcome screen
iWelcomeLoginBtn                = //button[@class='lnd_primary_button']

# Continue / Submit button on the Keycloak username entry form
iUsernameContinuebtn            = //input[@id='kc-login']

# Login submit button on the Keycloak password entry form
iLoginbtn                       = //input[@id='kc-login']

# Submit button on the TOTP entry screen (after 6-digit code is entered)
iTOTPsubmitBtn                  = //input[@id='saveTOTPBtn']

# Submit button on the PIN login form
iPinLoginBtn                    = //form[@id='kc-pin-login-form']//input[@id='kc-login']

# Accept Terms & Conditions confirmation button (enabled only after checkbox is ticked)
iAcceptTermsBtn                 = //input[@id='kc-accept']

# Logout button in the application side/header menu
iLogoutbtn                      = //*[@id="app-menu-logout-button"]

# -----------------------------------------------------------------------------------------------------------------------------------
# Authorization / Disclaimer ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# 'I Understand' button on the unauthorized / disclaimer screen
# Note: XPath uses descendant text match to avoid attribute-only fragility
iUnauthorizedBtn                = //button[.//span[contains(text(),'I Understand')]]

# -----------------------------------------------------------------------------------------------------------------------------------
# Farmer Dashboard ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# Opens the Farmer Dashboard for the currently selected client
iViewDashboard                  = //button[contains(@class, 'mdc-button')]//span[normalize-space()='View dashboard']

# Initiates a new BISS application or amendment for the selected farmer
# Note: handles both 'Start Application' and 'Start amendment' labels
iStartApplicationBtn            = //button[.//span[normalize-space()='Start Application' or normalize-space()='Start amendment']]

# Deletes the current application draft from the Farmer Dashboard
iDeleteDraftBtn                 = //button[contains(@class, 'mdc-button')]//span[normalize-space()='Delete draft']

# Confirms deletion in the 'Delete draft' confirmation popup
iConfirmDeleteBtn               = //button[contains(@class, 'mdc-button')]//span[normalize-space()='Yes, delete']

# 'No, cancel' button in the deletion confirmation popup
iCancelDeleteBtn                = //mat-dialog-container//button//span[normalize-space()='No, cancel']

# -----------------------------------------------------------------------------------------------------------------------------------
# Wizard Navigation ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# 'Next' button to advance to the next wizard step (primary selector)
iNextBtn                        = //button[contains(@class, 'next-button')]//span[normalize-space()='Next']

# 'Next' button alternative selector (used when next-button class is absent)
iNextBtn2                       = //button[contains(@class,'mat-mdc-button') and .//span[normalize-space()='Next']]

# Generic 'Continue' button used across multiple wizard steps
iContinueBtn                    = //button[descendant::span[contains(normalize-space(),'Continue')]]

# Generic 'Cancel' button used across multiple wizard steps and dialogs
iCancelBtn                      = //button[.//span[normalize-space()='Cancel']]

# -----------------------------------------------------------------------------------------------------------------------------------
# Scheme Selection ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# 'I understand' acknowledgment button on the Scheme Selection page
iIUnderstandBtn                 = //button[.//span[text()='I understand']]

# -----------------------------------------------------------------------------------------------------------------------------------
# Land Details Page ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# 'Add parcel' button on the Land Details step
iAddParcelBtn                   = //button[contains(@class, 'btn-add-parcel')]//span[normalize-space()='Add parcel']

# 'Add plot' button on the Land Details step
iAddPlotBtn                     = //button[.//span[normalize-space()='Add plot']]

# 'Open Map' button for launching the map viewer for a parcel
iMapOpenBtn                     = //button[normalize-space(.)='Open Map']

# 'Claim' button to confirm a parcel claim (within the Add Parcel flow)
iClaimParcelBtn                 = //button[contains(@class, 'mdc-button')]//span[normalize-space()='Claim']

# 'Claim' button (alternative ? plain text match, used in map context)
claimButtonText                 = //button[normalize-space()='Claim']

# 'Add' button inside the Add Parcel / Add Plot dialog to confirm entry
iParcelFormAddBtn               = //button[contains(@class, 'mdc-button')]//span[normalize-space()='Add']

# -----------------------------------------------------------------------------------------------------------------------------------
# Edit Parcel Dialog ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# 'Save changes' button inside the Edit Parcel side dialog
iSaveParcelChangesBtn           = //button[contains(@class,'mat-mdc-unelevated-button')]//span[text()=' Save changes ']

# Herd/parcel expand arrow to expand a row in the client table
iHeardExpandArrow               = //button[@aria-label='expand row' and .//mat-icon[text()='keyboard_arrow_down']]

# Herd number search submit button on the My Clients page
herdSearchBtn                   = //button[@aria-label='Search' and .//mat-icon[text()='search']]

# Delete icon button inside the land details table row
iDeleteParcelRow                = //mat-icon[@aria-label='Delete parcel']

# Undo deletion button that appears after a parcel row is marked for deletion
iUndoDeletion                   = //button[@aria-label='Undo deletion' and .//mat-icon[normalize-space()='undo']]

# -----------------------------------------------------------------------------------------------------------------------------------
# Dialog Controls ? Buttons
# -----------------------------------------------------------------------------------------------------------------------------------

# Close 'X' icon button at the top right of any mat-dialog
iClosePopupBtn                  = //mat-dialog-container//button[contains(@class, 'close-icon')]

# Close 'X' icon button using mat-dialog-close attribute (alternative selector)
iCloseDialogBtn                 = //button[@mat-dialog-close][.//mat-icon[normalize-space()='close']]

# -----------------------------------------------------------------------------------------------------------------------------------
# Map Amendment ? Buttons (Map Feature Page)
# -----------------------------------------------------------------------------------------------------------------------------------

# 'Select Feature' link/button on the map feature selection panel
selectFeature                   = //*[@id='selectContinuation_Link']

# Alternative text-based locator for the Select Feature action
selectFeatureText               = //a[.//span[normalize-space()='Select Feature']]

# Claim parcel button by element ID on the map page
claimButton                     = //*[@id='claimParcel']


# ===================================================================================================================================
# SECTION 3 : LINKS & NAVIGATION
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Authorization / App Selection ? Links
# -----------------------------------------------------------------------------------------------------------------------------------

# 'Basic Income Support for Sustainability' application hyperlink on the authorization page
iBissLink                       = //a[text()='Basic Income Support for Sustainability']

# -----------------------------------------------------------------------------------------------------------------------------------
# Left Sidebar Navigation ? Links
# -----------------------------------------------------------------------------------------------------------------------------------

