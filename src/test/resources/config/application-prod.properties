# ===================================================================================================================================
# File          : application-prod.properties
# Description   : PRODUCTION environment overrides for the BISS automation framework.
#                 Headless always true. Retry set to 2. Email always enabled.
#
# Folder        : src/test/resources/config/application-prod.properties
# Activation    : -Denv=prod
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 10-03-2026
# ===================================================================================================================================

app.url=https://www.biss.ie
headless=true
explicit.wait.seconds=30
retry.count=2
screenshot.on.pass=false
notify.email.enabled=true
notify.email.to=qa-team@biss.ie,management@biss.ie,director@biss.ie
db.url=jdbc:oracle:thin:@prod-db-server:1521:BISSPRD
db.username=biss_prd_user