# ===================================================================================================================================
# File          : ObjectRepository.properties
# Description   : Central Object Repository for the BISS automation framework.
#                 All UI element locators are stored here and read via ObjReader.getLocator(key).
#
# NAMING CONVENTION :
#   Keys use camelCase with a page prefix and element type suffix.
#   Locator type suffix (optional - used by ObjReader.getLocatorType):
#     .id | .name | .xpath | .css | .classname | .tagname | .linktext | .partiallinktext
#   Keys WITHOUT a suffix default to XPATH in ObjReader.getLocatorType().
#
# STRUCTURE:
#   All locators are grouped by ELEMENT TYPE ? all textboxes together, all buttons together, etc.
#   Page context is noted in the inline comment next to each key.
#
# ELEMENT TYPE SECTIONS:
#   1.  TEXTBOX
#   2.  TEXTAREA
#   3.  BUTTON
#   4.  CHECKBOX
#   5.  TOGGLE
#   6.  RADIO BUTTON
#   7.  DROPDOWN  (mat-select trigger)
#   8.  DROPDOWN OPTION  (mat-option / listbox items)
#   9.  TAB
#   10. LINK
#   11. LABEL / HEADER
#   12. ERROR MESSAGE
#   13. TABLE ROW
#   14. TABLE CELL
#   15. DIALOG / CONTAINER
#   16. IMAGE
#   17. SPINNER / LOADER
#   18. DYNAMIC LOCATOR
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 10-03-2026
# Last Reviewed : 26-03-2026
# ===================================================================================================================================


# ===================================================================================================================================
# 1. TEXTBOX
# ===================================================================================================================================

