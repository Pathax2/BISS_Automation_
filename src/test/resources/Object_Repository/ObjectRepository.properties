# ===================================================================================================================================
# File          : ObjectRepository.properties
# Description   : Central Object Repository for the BISS automation framework.
#                 All UI element locators are stored here and read via ObjReader.getLocator(key).
#
# NAMING CONVENTION :
#   Keys use camelCase with an 'i' prefix and page/feature prefix.
#   Locator type suffix (optional ? used by ObjReader.getLocatorType):
#     .id | .name | .xpath | .css | .classname | .tagname | .linktext | .partiallinktext
#   Keys WITHOUT a suffix default to XPATH in ObjReader.getLocatorType().
#
# PLACEHOLDER CONVENTION :
#   %s      ? replaced at runtime via String.format() in step definitions
#   {idx}   ? replaced at runtime via String.replace() in step definitions
#   {index} ? replaced at runtime via String.replace() in step definitions (NR/CISYF)
#   {value} ? replaced at runtime via String.replace() in step definitions (NR/CISYF radios)
#   ${INDEX}? replaced at runtime via String.replace() in step definitions (GAEC7)
#
# STRUCTURE :
#   SECTION 1  : TEXT BOXES & INPUT FIELDS
#   SECTION 2  : BUTTONS
#   SECTION 3  : LINKS & NAVIGATION
#   SECTION 4  : DROPDOWNS & SELECTS
#   SECTION 5  : CHECKBOXES
#   SECTION 6  : RADIO BUTTONS
#   SECTION 7  : TOGGLES
#   SECTION 8  : LABELS, HEADERS & TEXT VERIFICATIONS
#   SECTION 9  : ERROR & VALIDATION MESSAGES
#   SECTION 10 : TABLE & LIST ELEMENTS
#   SECTION 11 : DIALOG & MODAL CONTAINERS
#   SECTION 12 : MAP & GEOSPATIAL ELEMENTS
#   SECTION 13 : UTILITY & FRAMEWORK ELEMENTS
#   SECTION 14 : GAEC 7
#   SECTION 15 : ECO SCHEME (ACRES)
#   SECTION 16 : MY CLIENTS ? TABS & CREATE CLIENT
#   SECTION 17 : PRELIMINARY CHECKS (TC_18 / TC_19 / TC_20)
#   SECTION 18 : NR/CISYF (TC_13)
#
# NOTE ON NAMING :
#   Some legacy keys do not use the 'i' prefix (e.g. herdSearchInput, clientTableRows).
#   These are preserved as-is to avoid breaking existing step definitions.
#   All new keys added after 21-05-2026 must follow the 'i' prefix convention.
#
# Author        : Aniket Pathare | aniket.pathare@government.ie
# Date Created  : 10-03-2026
# Updated       : 21-05-2026 ? Full restructure: 18 sections, 4 missing keys added,
#                              duplicate iMatSelectOpenPanel resolved, all keys categorised
# ===================================================================================================================================


# =============================================================================================================================================================================================================================
