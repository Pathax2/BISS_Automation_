# ===================================================================================================================================
# 6. RADIO BUTTON
# ===================================================================================================================================

# [Add Plot / Map Amendment] Generic radio button ? %s replaced at runtime with the visible label text
# Recommended for use in step definitions. Example: iMapChangeOption.replace("%s", "Upload Map")
iMapChangeOption=//mat-radio-button//label[contains(normalize-space(),'%s')]

# [Add Plot / Map Amendment] Radio group scoped version ? %s replaced at runtime
iMapChangeOptions=//mat-radio-group//mat-radio-button//label[contains(normalize-space(),'%s')]

# [Add Plot / Map Amendment] Value-attribute based radio selector ? %s replaced with the value attribute
iMapChangeOptionValue=//input[@formcontrolname='mapAmendmentType' and @value='%s']

# [Add Plot / Map Amendment] Explicit static radio ? Edit Map Online
iMapChangeOption_EditMapOnline=//mat-radio-button//label[normalize-space()='Edit Map Online']

# [Add Plot / Map Amendment] Explicit static radio ? Upload Map
iMapChangeOption_UploadMap=//mat-radio-button//label[normalize-space()='Upload Map']

# [Add Plot / Map Amendment] Explicit static radio ? Submit Paper Map By Post
iMapChangeOption_SubmitPaperMap=//mat-radio-button//label[normalize-space()='Submit Paper Map By Post']


