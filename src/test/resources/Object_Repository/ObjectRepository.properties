iFirstClientName                = (//table[@data-testid='dashboard-client-table']//tr[contains(@class,'client-list-element-row')]//a)[1]


# ===================================================================================================================================
# SECTION 4 : DROPDOWNS & SELECTS
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Pagination ? Dropdowns
# -----------------------------------------------------------------------------------------------------------------------------------

# Items-per-page mat-select on any paginated table
iListItemsPerPage               = //mat-select[contains(@class, 'mat-mdc-select')]

# Open/visible mat-select panel ? used as a wait condition after triggering a dropdown
iMatSelectOpenPanel             = //div[@role='listbox' and contains(@class,'mat-mdc-select-panel') and contains(@class,'mdc-menu-surface--open')]

# Last non-disabled option in the currently open mat-select panel
iMatSelectLastOption            = //div[@role='listbox' and contains(@class,'mdc-menu-surface--open')]//mat-option[not(@aria-disabled='true')][last()]

# -----------------------------------------------------------------------------------------------------------------------------------
# Land Details Dialog ? Dropdowns
# -----------------------------------------------------------------------------------------------------------------------------------

# Ownership Status mat-select trigger inside the Edit Parcel dialog
iOwnershipStatusSelect          = //mat-select[@formcontrolname='ownershipStatus']

# Ownership Status option inside the open listbox panel ? %s replaced at runtime with visible text
iOwnershipStatusOwned           = //div[@role='listbox']//mat-option//span[normalize-space()='%s']

# Parcel Use mat-select trigger (initial ? targets 'Select option' placeholder text)
iParcelUseSelect                = (//mat-select[.//span[normalize-space()='Select option']])[1]

# Parcel Use mat-select trigger (dialog context ? anchored via formcontrolname inside biss-land-details-dialog)
# Use this selector when the dropdown is inside the Edit Parcel side panel dialog
iParcelUseSelect2               = //biss-land-details-dialog//lib-biss-select-search[@formcontrolname='parcelUse']//div[contains(@class,'mat-mdc-select-trigger')]

# Parcel Use / Plot Use option inside the open overlay panel ? %s replaced at runtime
# Note: Anchored to optionListItem class which is specific to BISS custom mat-option components
iParcelUseOption                = //mat-option[contains(@class,'optionListItem')]//span[contains(normalize-space(),'%s')]

# Organic Status mat-select trigger inside the Edit Parcel dialog
iOrganicStatusSelect            = //mat-select[@formcontrolname='organicStatus']

# Organic Status option inside the open listbox panel ? %s replaced at runtime with visible text
iOrganicStatusConventional      = //div[@role='listbox']//mat-option//span[normalize-space()='%s']

# Plot Use mat-select trigger on the Add Plot dialog (targets 'Select option' placeholder)
iPlotUseSelect                  = (//mat-select[.//span[normalize-space()='Select option']])[1]

# County mat-select trigger on the Add Plot dialog (no formcontrolname ? uses placeholder text)
iCountySelect                   = //mat-select[.//span[contains(text(), 'Select county')]]

# County option inside the open listbox panel ? %s replaced at runtime with county name
iCountyOption                   = //div[@role='listbox']//mat-option//span[normalize-space()='%s']

# Townland mat-select trigger on the Add Plot dialog (uses placeholder text)
iTownlandSelect                 = //mat-select[.//span[contains(text(), 'Select townland')]]

# 'Apples' parcel use option ? explicit locator for the Apples option when needed without %s substitution
iParcelUseApplesOption          = //div[@role='listbox']//mat-option//span[normalize-space()='Apples']


