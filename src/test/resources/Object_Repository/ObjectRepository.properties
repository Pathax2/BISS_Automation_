# ===================================================================================================================================
# File          : ObjectRepository.properties
# Description   : Central Object Repository for the BISS automation framework.
#                 All UI element locators are stored here and read via ObjReader.getLocatorValue(key).
#
# NAMING CONVENTION :
#   Keys use camelCase with a page prefix and element type suffix.
#   Locator type suffix (optional ? used by ObjReader.getLocatorType):
#     .id | .name | .xpath | .css | .classname | .tagname | .linktext | .partiallinktext
#   Keys WITHOUT a suffix default to XPATH in ObjReader.getLocatorType().
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 10-03-2026
# ===================================================================================================================================

# -----------------------------------------------------------------------------------------------------------------------------------
# Login Page Locators
# -----------------------------------------------------------------------------------------------------------------------------------

# Welcome screen ? initial login button shown before username entry
iWelcomeLoginBtn=//button[@class='lnd_primary_button']

# Username input field on the Keycloak username form
iUsernametxtbox=//input[@id='username']

# Continue / Submit button on the Log in to your account form
iUsernameContinuebtn=//input[@id='kc-login']

# Password input field on the Keycloak password form
iPasswordtxtbox=//input[@id='password']

# Login submit button on the Keycloak password form
iLoginbtn=//input[@id='kc-login']

# MFA OTP input field (Microsoft Authenticator one-time code)
iOPTtxtbox=//input[@id='otp']

#Click on Logout Button
iLogoutbtn=//*[@id="app-menu-logout-button"]

#Invalid Username/Password Error Msg
iInvalidCredErr=//span[@class='kc-feedback-text']

# "I Understand" button shown on the unauthorized / disclaimer screen
# BUG FIX: Original XPath had a malformed closing bracket ? corrected below
iUnauthorizedBtn=//button[.//span[contains(text(),'I Understand')]]

#Search bar for looking uo Authorised Applications on homepage
iAppSearchBar=//input[@placeholder='Type the name of the app']

#Post Search Results label that acknowledges that applications matching your search
iSearchAppLabel=//span[text()='Found 1 applications matching your search']

#Click on Basic Income Support for Sustainability Hyperlink on Authorization Application page
iBissLink=//a[text()='Basic Income Support for Sustainability']
# -----------------------------------------------------------------------------------------------------------------------------------
# Dashboard / Post-Login Page Locators
# -----------------------------------------------------------------------------------------------------------------------------------

# Application list / dashboard title heading ? used in verifyLoginSuccessful() to confirm successful login
iDashboardTitle=//h1[@id='application-list-title']

#Verify User has Landed on BISS Application & verify Page title
