# ===================================================================================================================================
# File          : cucumber.properties
# Description   : Cucumber plugin configuration for the BISS automation framework.
#
# PURPOSE ? This file fixes ONE thing only:
#   IntelliJ shows "undefined step reference" warnings on .feature files because
#   the IDE doesn't know which package contains the step definitions.
#   This file tells it. That's all it does.
#
# THIS FILE DOES NOT RUN ANY TESTS.
# Tests are always started from TestRunner.java ? never from this file or a feature file.
#
# Folder        : src/test/resources/cucumber.properties
#
# Author        : Aniket Pathare | aniket.pathare@goverment.ie
# Date Created  : 11-03-2026
# ===================================================================================================================================

# Tells IntelliJ Cucumber plugin where step definitions live ? fixes "undefined step" warnings
cucumber.glue=stepdefinitions

# Suppress the "publish results" prompt that appears in the console after every run
cucumber.publish.quiet=true